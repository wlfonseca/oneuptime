api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: oneuptime_oneuptime

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@cw2tecnologia.com.br
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
